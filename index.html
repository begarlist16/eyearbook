<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Begarlist 16 — Ebook Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- PAGE LOADER -->
  <div class="page-loader" id="pageLoader">
    <div class="loader-ring"></div>
    <span class="loader-text">Memuat Buku…</span>
  </div>

  <!-- READER WRAP -->
  <div class="reader-wrap" id="readerWrap">

    <!-- TOP-LEFT CONTROLS -->
    <div class="top-controls">
      <a href="https://begarlist16.github.io" class="home-btn" title="Kembali ke Homepage">
        <span class="home-emoji">🏠</span>
      </a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        <span id="themeIcon">☀</span>
      </button>
    </div>

    <!-- SPREAD CONTAINER -->
    <div class="spread-outer" id="spreadOuter">
      <div class="spread-container" id="spreadContainer">

        <!-- LEFT PAGE -->
        <div class="page-slot left-page" id="leftPage">
          <div class="page-inner">
            <div class="page-skeleton" id="leftSkeleton"></div>
            <img id="leftImg" src="" alt="Halaman kiri" draggable="false" />
            <div class="hd-overlay" id="leftHdOverlay" onclick="if(PAGES[currentSpread]) openLightbox(currentSpread)">
              <span class="hd-label">🔍 Lihat HD</span>
            </div>
          </div>
        </div>

        <!-- RIGHT PAGE -->
        <div class="page-slot right-page" id="rightPage">
          <div class="page-inner">
            <div class="page-skeleton" id="rightSkeleton"></div>
            <img id="rightImg" src="" alt="Halaman kanan" draggable="false" />
            <div class="hd-overlay" id="rightHdOverlay" onclick="const ri=currentSpread+1; if(!isSinglePage && PAGES[ri]) openLightbox(ri); else if(PAGES[currentSpread]) openLightbox(currentSpread)">
              <span class="hd-label">🔍 Lihat HD</span>
            </div>
          </div>
        </div>

      </div>

      <!-- CLICK ZONES for page turn -->
      <div class="click-zone click-prev" id="clickPrev" onclick="prevSpread()" title="Halaman sebelumnya"></div>
      <div class="click-zone click-next" id="clickNext" onclick="nextSpread()" title="Halaman berikutnya"></div>
    </div>

    <!-- BOTTOM TOOLBAR -->
    <div class="bottom-bar" id="bottomBar">

      <!-- Left cluster: nav -->
      <div class="bar-cluster bar-left">
        <button class="bar-btn nav-btn" id="btnPrev" onclick="prevSpread()" title="Sebelumnya (←)">
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z"/></svg>
        </button>

        <!-- Page indicator / jump input -->
        <div class="page-indicator">
          <input type="number" id="pageJumpInput" class="page-jump-input" min="1" title="Lompat ke halaman" onchange="jumpToPage(this.value)" onkeydown="if(event.key==='Enter') jumpToPage(this.value)" />
          <span class="page-sep">/</span>
          <span class="page-total" id="pageTotal"></span>
        </div>

        <button class="bar-btn nav-btn" id="btnNext" onclick="nextSpread()" title="Berikutnya (→)">
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z"/></svg>
        </button>
      </div>

      <!-- Center cluster: search -->
      <div class="bar-cluster bar-center">
        <!-- Desktop search (hidden on mobile) -->
        <div class="search-wrap" id="searchWrap">
          <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"/>
          </svg>
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Cari halaman…"
            oninput="handleSearch(this.value)"
            onkeydown="handleSearchKey(event)"
            autocomplete="off"
          />
          <button class="search-clear" id="searchClear" onclick="clearSearch()" style="display:none">✕</button>
        </div>

        <!-- Mobile search button (hidden on desktop) -->
        <button class="bar-btn mobile-search-btn" id="mobileSearchBtn" onclick="openMobileSearch()" title="Cari halaman">
          <svg viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"/>
          </svg>
        </button>

        <!-- Search results dropdown (desktop only) -->
        <div class="search-results" id="searchResults"></div>
      </div>

      <!-- Right cluster: fullscreen -->
      <div class="bar-cluster bar-right">
        <button class="bar-btn" id="btnFull" onclick="toggleFullscreen()" title="Layar Penuh (F)">
          <svg id="fullIcon" viewBox="0 0 20 20" fill="currentColor">
            <path d="M3 4a1 1 0 011-1h4a1 1 0 010 2H5.414l2.293 2.293a1 1 0 11-1.414 1.414L4 6.414V8a1 1 0 01-2 0V4zm14 0a1 1 0 00-1-1h-4a1 1 0 000 2h1.586l-2.293 2.293a1 1 0 001.414 1.414L15 6.414V8a1 1 0 002 0V4zM3 16a1 1 0 001 1h4a1 1 0 000-2H6.414l2.293-2.293a1 1 0 00-1.414-1.414L5 13.586V12a1 1 0 00-2 0v4zm14 0a1 1 0 01-1 1h-4a1 1 0 010-2h1.586l-2.293-2.293a1 1 0 011.414-1.414L15 13.586V12a1 1 0 012 0v4z"/>
          </svg>
        </button>
      </div>

    </div><!-- /bottom-bar -->

  </div><!-- /reader-wrap -->

  <!-- MOBILE SEARCH MODAL -->
  <div class="mobile-search-modal" id="mobileSearchModal">
    <div class="mobile-search-header">
      <div class="mobile-search-input-wrap">
        <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"/>
        </svg>
        <input
          type="text"
          id="mobileSearchInput"
          class="search-input"
          placeholder="Cari halaman…"
          oninput="handleMobileSearch(this.value)"
          onkeydown="handleMobileSearchKey(event)"
          autocomplete="off"
        />
        <button class="search-clear" id="mobileSearchClear" onclick="clearMobileSearch()" style="display:none">✕</button>
      </div>
      <button class="mobile-search-close" onclick="closeMobileSearch()">Batal</button>
    </div>
    <div class="mobile-search-results" id="mobileSearchResults"></div>
  </div>

  <!-- LIGHTBOX OVERLAY -->
  <div class="lightbox-overlay" id="lightboxOverlay" onclick="closeLightboxOnBackdrop(event)">
    <button class="lightbox-close" onclick="closeLightbox()" title="Tutup (Esc)">✕</button>

    <!-- Zoom level buttons -->
    <div class="lightbox-zoom-bar" id="lightboxZoomBar">
      <button class="lbz-btn" onclick="setLightboxZoom(0.50)" data-zoom="50">50%</button>
      <button class="lbz-btn" onclick="setLightboxZoom(0.75)" data-zoom="75">75%</button>
      <button class="lbz-btn" onclick="setLightboxZoom(1.00)" data-zoom="100">100%</button>
      <button class="lbz-btn" onclick="setLightboxZoom(1.50)" data-zoom="150">150%</button>
    </div>

    <!-- Pan canvas -->
    <div class="lightbox-canvas" id="lightboxCanvas">
      <img class="lightbox-img" id="lightboxImg" src="" alt="Halaman penuh" draggable="false" />
      <div class="lightbox-spinner" id="lightboxSpinner"></div>
    </div>

    <!-- Minimap preview -->
    <div class="lightbox-minimap" id="lightboxMinimap">
      <canvas id="lightboxMinimapCanvas"></canvas>
      <div class="lbm-viewport" id="lightboxMinimapViewport"></div>
    </div>

  </div>

  <!-- OFFLINE / UPDATE TOAST -->
  <div id="swToast" style="
    display:none;position:fixed;bottom:72px;left:50%;transform:translateX(-50%);
    background:var(--surface);color:var(--text);border:1px solid var(--border);
    border-radius:var(--radius);padding:10px 18px;font-size:13px;font-family:var(--font);
    box-shadow:0 4px 20px rgba(0,0,0,.45);z-index:9999;display:flex;align-items:center;
    gap:10px;opacity:0;transition:opacity .3s ease;pointer-events:none;
  " id="swToast">
    <span id="swToastMsg"></span>
    <button id="swToastBtn" style="
      background:var(--accent);color:#000;border:none;border-radius:6px;
      padding:4px 10px;font-size:12px;cursor:pointer;font-weight:600;flex-shrink:0;
    " onclick="swToastAction()"></button>
    <button onclick="dismissSwToast()" style="
      background:none;border:none;color:var(--text2);cursor:pointer;font-size:15px;line-height:1;
    ">✕</button>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>

  <!-- SERVICE WORKER REGISTRATION -->
  <script>
  (function () {
    if (!('serviceWorker' in navigator)) return;

    let _swWaiting = null;

    function showSwToast(msg, btnLabel, action) {
      const toast = document.getElementById('swToast');
      const msgEl = document.getElementById('swToastMsg');
      const btn   = document.getElementById('swToastBtn');
      if (!toast) return;
      msgEl.textContent = msg;
      if (btnLabel) {
        btn.textContent = btnLabel;
        btn.style.display = '';
        window._swToastAction = action || null;
      } else {
        btn.style.display = 'none';
      }
      toast.style.display = 'flex';
      requestAnimationFrame(() => { toast.style.opacity = '1'; toast.style.pointerEvents = 'auto'; });
      // auto-dismiss info toasts after 4 s
      if (!btnLabel) setTimeout(dismissSwToast, 4000);
    }

    window.dismissSwToast = function () {
      const toast = document.getElementById('swToast');
      if (!toast) return;
      toast.style.opacity = '0';
      toast.style.pointerEvents = 'none';
      setTimeout(() => { toast.style.display = 'none'; }, 320);
    };

    window.swToastAction = function () {
      if (window._swToastAction) window._swToastAction();
      dismissSwToast();
    };

    window.addEventListener('online',  () => showSwToast('🌐 Koneksi kembali.'));
    window.addEventListener('offline', () => showSwToast('📴 Anda offline — buku tetap bisa dibaca dari cache.'));

    navigator.serviceWorker.register('./sw.js').then((reg) => {

      // Check for a waiting (updated) SW
      function trackWaiting(sw) {
        if (!sw) return;
        _swWaiting = sw;
        showSwToast(
          '🔄 Versi baru tersedia.',
          'Perbarui',
          () => {
            _swWaiting.postMessage('SKIP_WAITING');
          }
        );
      }

      if (reg.waiting) trackWaiting(reg.waiting);
      reg.addEventListener('updatefound', () => {
        const sw = reg.installing;
        sw.addEventListener('statechange', () => {
          if (sw.state === 'installed' && navigator.serviceWorker.controller) {
            trackWaiting(sw);
          }
        });
      });

      // When the SW activates (after skip-waiting), reload to pick up new files
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });

      // Periodically check for updates in the background (every 30 min)
      setInterval(() => reg.update(), 30 * 60 * 1000);

    }).catch((err) => {
      console.warn('[SW] Registration failed:', err);
    });
  })();
  </script>
  <script src="/pwa-register.js"></script>
</body>
</html>
