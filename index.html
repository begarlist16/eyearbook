<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Begarlist 16 — Ebook Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- PAGE LOADER -->
  <div class="page-loader" id="pageLoader">
    <div class="loader-ring"></div>
    <span class="loader-text">Memuat Buku…</span>
  </div>

  <!-- READER WRAP -->
  <div class="reader-wrap" id="readerWrap">

    <!-- TOP-LEFT CONTROLS -->
    <div class="top-controls">
      <a href="https://begarlist16.github.io" class="home-btn" title="Kembali ke Homepage">
        <span class="home-emoji">🏠</span>
      </a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        <span id="themeIcon">☀</span>
      </button>
    </div>

    <!-- SPREAD CONTAINER -->
    <div class="spread-outer" id="spreadOuter">
      <div class="spread-container" id="spreadContainer">

        <!-- LEFT PAGE -->
        <div class="page-slot left-page" id="leftPage">
          <div class="page-inner">
            <div class="page-skeleton" id="leftSkeleton"></div>
            <img id="leftImg" src="" alt="Halaman kiri" draggable="false" />

          </div>
        </div>

        <!-- RIGHT PAGE -->
        <div class="page-slot right-page" id="rightPage">
          <div class="page-inner">
            <div class="page-skeleton" id="rightSkeleton"></div>
            <img id="rightImg" src="" alt="Halaman kanan" draggable="false" />

          </div>
        </div>

      </div>

      <!-- CLICK ZONES for page turn -->
      <div class="click-zone click-prev" id="clickPrev" onclick="prevSpread()" title="Halaman sebelumnya"></div>
      <div class="click-zone click-next" id="clickNext" onclick="nextSpread()" title="Halaman berikutnya"></div>
    </div>

    <!-- BOTTOM TOOLBAR -->
    <div class="bottom-bar" id="bottomBar">

      <!-- Left cluster: nav -->
      <div class="bar-cluster bar-left">
        <button class="bar-btn nav-btn" id="btnPrev" onclick="prevSpread()" title="Sebelumnya (←)">
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z"/></svg>
        </button>

        <!-- Page indicator / jump input -->
        <div class="page-indicator">
          <input type="number" id="pageJumpInput" class="page-jump-input" min="1" title="Lompat ke halaman" onchange="jumpToPage(this.value)" onkeydown="if(event.key==='Enter') jumpToPage(this.value)" />
          <span class="page-sep">/</span>
          <span class="page-total" id="pageTotal"></span>
        </div>

        <button class="bar-btn nav-btn" id="btnNext" onclick="nextSpread()" title="Berikutnya (→)">
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z"/></svg>
        </button>
      </div>

      <!-- Center cluster: search -->
      <div class="bar-cluster bar-center">
        <!-- Desktop search (hidden on mobile) -->
        <div class="search-wrap" id="searchWrap">
          <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"/>
          </svg>
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Cari halaman…"
            oninput="handleSearch(this.value)"
            onkeydown="handleSearchKey(event)"
            autocomplete="off"
          />
          <button class="search-clear" id="searchClear" onclick="clearSearch()" style="display:none">✕</button>
        </div>

        <!-- Mobile search button (hidden on desktop) -->
        <button class="bar-btn mobile-search-btn" id="mobileSearchBtn" onclick="openMobileSearch()" title="Cari halaman">
          <svg viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"/>
          </svg>
        </button>

        <!-- Search results dropdown (desktop only) -->
        <div class="search-results" id="searchResults"></div>
      </div>

      <!-- Right cluster: lightbox + fullscreen -->
      <div class="bar-cluster bar-right">
        <button class="bar-btn" id="btnLightbox" onclick="openLightboxCurrent()" title="Lihat gambar penuh (L)">
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M5 3a2 2 0 00-2 2v2a1 1 0 002 0V5h2a1 1 0 000-2H5zm10 0a2 2 0 012 2v2a1 1 0 01-2 0V5h-2a1 1 0 010-2h2zM5 17a2 2 0 01-2-2v-2a1 1 0 012 0v2h2a1 1 0 010 2H5zm10 0a2 2 0 002-2v-2a1 1 0 00-2 0v2h-2a1 1 0 000 2h2z"/></svg>
        </button>
        <button class="bar-btn" id="btnFull" onclick="toggleFullscreen()" title="Layar Penuh (F)">
          <svg id="fullIcon" viewBox="0 0 20 20" fill="currentColor">
            <path d="M3 4a1 1 0 011-1h4a1 1 0 010 2H5.414l2.293 2.293a1 1 0 11-1.414 1.414L4 6.414V8a1 1 0 01-2 0V4zm14 0a1 1 0 00-1-1h-4a1 1 0 000 2h1.586l-2.293 2.293a1 1 0 001.414 1.414L15 6.414V8a1 1 0 002 0V4zM3 16a1 1 0 001 1h4a1 1 0 000-2H6.414l2.293-2.293a1 1 0 00-1.414-1.414L5 13.586V12a1 1 0 00-2 0v4zm14 0a1 1 0 01-1 1h-4a1 1 0 010-2h1.586l-2.293-2.293a1 1 0 011.414-1.414L15 13.586V12a1 1 0 012 0v4z"/>
          </svg>
        </button>
      </div>

    </div><!-- /bottom-bar -->

  </div><!-- /reader-wrap -->

  <!-- MOBILE SEARCH MODAL -->
  <div class="mobile-search-modal" id="mobileSearchModal">
    <div class="mobile-search-header">
      <div class="mobile-search-input-wrap">
        <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"/>
        </svg>
        <input
          type="text"
          id="mobileSearchInput"
          class="search-input"
          placeholder="Cari halaman…"
          oninput="handleMobileSearch(this.value)"
          onkeydown="handleMobileSearchKey(event)"
          autocomplete="off"
        />
        <button class="search-clear" id="mobileSearchClear" onclick="clearMobileSearch()" style="display:none">✕</button>
      </div>
      <button class="mobile-search-close" onclick="closeMobileSearch()">Batal</button>
    </div>
    <div class="mobile-search-results" id="mobileSearchResults"></div>
  </div>

  <!-- LIGHTBOX OVERLAY -->
  <div class="lightbox-overlay" id="lightboxOverlay" onclick="closeLightboxOnBackdrop(event)">
    <button class="lightbox-close" onclick="closeLightbox()" title="Tutup (Esc)">✕</button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev" onclick="lightboxNav(-1)" title="Sebelumnya">&#8249;</button>
    <button class="lightbox-nav lightbox-next" id="lightboxNext" onclick="lightboxNav(1)" title="Berikutnya">&#8250;</button>
    <div class="lightbox-inner" id="lightboxInner">
      <img class="lightbox-img" id="lightboxImg" src="" alt="Halaman penuh" draggable="false" />
      <div class="lightbox-spinner" id="lightboxSpinner"></div>
    </div>
    <div class="lightbox-caption" id="lightboxCaption"></div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
